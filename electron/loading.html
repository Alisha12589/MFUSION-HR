<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>กำลังเริ่มต้น...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: white;
      font-family: 'Segoe UI', 'Tahoma', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }
    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(59,130,246,0.4);
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 48px;
    }
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .dots {
      display: flex;
      gap: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #3b82f6;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    .status {
      color: #475569;
      font-size: 13px;
    }
    .version {
      position: fixed;
      bottom: 20px;
      color: #1e293b;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="logo">HR</div>
  <h1>MFUSION-HR</h1>
  <p class="subtitle">ระบบ HR & บัญชี</p>
  <div class="spinner-wrap">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <p class="status">กำลังเริ่มต้นระบบ กรุณารอสักครู่...</p>
  </div>
  <p class="version">v1.0.0</p>
</body>
</html>
